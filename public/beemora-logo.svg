<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.3" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Outer hexagon -->
  <polygon
    points="256,24 466,146 466,366 256,488 46,366 46,146"
    fill="url(#hexGrad)"
    stroke="#818cf8"
    stroke-width="5"
    stroke-linejoin="miter"
  />

  <!-- Inner glow hex -->
  <polygon
    points="256,56 440,162 440,350 256,456 72,350 72,162"
    fill="none"
    stroke="url(#glowGrad)"
    stroke-width="1.5"
    stroke-linejoin="miter"
  />

  <!-- "H" letter - bold, geometric -->
  <path
    d="M 155,135 L 155,380 L 205,380 L 205,280 L 307,280 L 307,380 L 357,380 L 357,135 L 307,135 L 307,235 L 205,235 L 205,135 Z"
    fill="url(#hGrad)"
    filter="url(#glow)"
  />

  <!-- Hexagonal accent nodes -->
  <polygon points="130,120 140,114 150,120 150,130 140,136 130,130" fill="#06b6d4" opacity="0.5"/>
  <polygon points="362,120 372,114 382,120 382,130 372,136 362,130" fill="#06b6d4" opacity="0.5"/>

  <!-- Circuit lines -->
  <line x1="150" y1="125" x2="155" y2="125" stroke="#22d3ee" stroke-width="2" opacity="0.4"/>
  <line x1="357" y1="125" x2="362" y2="125" stroke="#22d3ee" stroke-width="2" opacity="0.4"/>

  <!-- Bottom honeycomb micro-pattern -->
  <polygon points="220,430 230,424 240,430 240,440 230,446 220,440" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.25"/>
  <polygon points="240,430 250,424 260,430 260,440 250,446 240,440" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.25"/>
  <polygon points="260,430 270,424 280,430 280,440 270,446 260,440" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.25"/>
  <polygon points="280,430 290,424 300,430 300,440 290,446 280,440" fill="none" stroke="#a78bfa" stroke-width="0.8" opacity="0.25"/>
</svg>
