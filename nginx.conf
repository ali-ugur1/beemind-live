# ╔══════════════════════════════════════════════════════════════════╗
# ║  BeeMora — Nginx Reverse Proxy Configuration                   ║
# ║                                                                 ║
# ║  Bu dosyayı kopyalayın:                                        ║
# ║    sudo cp nginx.conf /etc/nginx/sites-available/beemora      ║
# ║    sudo ln -s /etc/nginx/sites-available/beemora \             ║
# ║               /etc/nginx/sites-enabled/beemora                 ║
# ║    sudo nginx -t && sudo systemctl reload nginx                ║
# ║                                                                 ║
# ║  SSL için (Let's Encrypt):                                     ║
# ║    sudo certbot --nginx -d yourdomain.com                      ║
# ╚══════════════════════════════════════════════════════════════════╝

# Rate limiting zone (brute force koruması)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=sensor_limit:10m rate=10r/s;

# Upstream (PM2 backend)
upstream beemora_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

# HTTP → HTTPS yönlendirme
server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt doğrulama
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tüm diğer istekleri HTTPS'e yönlendir
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS Ana Sunucu
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # ── SSL (Let's Encrypt tarafından otomatik doldurulur) ────────
    # ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Genel Ayarlar ─────────────────────────────────────────────
    client_max_body_size 10M;
    charset utf-8;

    # ── Güvenlik Başlıkları ───────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # ── Gzip Sıkıştırma ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ── Statik dosyalar (Vite build çıktısı) ─────────────────────
    # Build edildikten sonra dist/ dizini Nginx tarafından sunulur
    root /home/beemora/beemora-live/dist;
    index index.html;

    # Statik assets (JS, CSS, images) — uzun cache
    location /assets/ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # PWA dosyaları
    location /sw.js {
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /manifest.json {
        expires 1d;
        add_header Cache-Control "public";
    }

    # ── API Endpoints → Backend Proxy ─────────────────────────────

    # Auth endpoints (sıkı rate limit)
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://beemora_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Sensor data endpoint (IoT — ayrı rate limit)
    location /api/sensor-data {
        limit_req zone=sensor_limit burst=20 nodelay;
        proxy_pass http://beemora_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # Health check (rate limit yok)
    location /api/health {
        proxy_pass http://beemora_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        access_log off;
    }

    # Diğer tüm API endpointleri
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://beemora_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Proxy timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ── SPA Fallback ──────────────────────────────────────────────
    # React Router tüm route'ları index.html üzerinden yönetir
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Güvenlik: Gizli dosyaları engelle ─────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ ^/(data|node_modules|src)/ {
        deny all;
    }

    # ── Loglama ───────────────────────────────────────────────────
    access_log /var/log/nginx/beemora-access.log;
    error_log /var/log/nginx/beemora-error.log warn;
}
